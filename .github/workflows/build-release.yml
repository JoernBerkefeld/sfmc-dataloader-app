name: Build & Publish Installers on Release

on:
    release:
        types: [published]

# electron-builder uploads artifacts to the GitHub Release, which needs write
# access to the repository's releases.
permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      platform: win
                      # Windows: NSIS installer (self-updating via electron-updater).
                      buildArgs: --win
                    - os: macos-latest
                      platform: mac
                      # macOS: dmg (self-updating via electron-updater).
                      buildArgs: --mac
                    - os: ubuntu-latest
                      platform: linux
                      # Linux: AppImage self-updates; deb/rpm are package-manager
                      # managed. snap is built in a separate, non-fatal step below.
                      buildArgs: --linux AppImage deb rpm
        runs-on: ${{ matrix.os }}
        name: build ${{ matrix.platform }} installers
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - run: npm ci --no-workspaces
            - run: npm run lint
            - run: npm test

            # rpm target needs rpmbuild on the runner (not installed by default).
            - name: Install rpm tooling (Linux)
              if: matrix.platform == 'linux'
              run: sudo apt-get update && sudo apt-get install -y rpm

            # Build the native installers for this runner's OS and upload them to
            # the release that triggered the workflow. `--publish always` uses the
            # `publish:` block in electron-builder.yml (GitHub provider).
            - name: Build & publish (${{ matrix.platform }})
              run: npx electron-builder ${{ matrix.buildArgs }} --publish always
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # macOS code signing + notarization. All optional: only attempt
                  # signing when a certificate secret is actually present. With no
                  # cert, CSC_IDENTITY_AUTO_DISCOVERY=false makes electron-builder
                  # produce an *unsigned* build instead of crashing with
                  # "<repo> not a file" while trying to resolve an empty CSC_LINK.
                  CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CSC_LINK != '' }}
                  CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
                  CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

            # snap requires snapcraft, which can be flaky on hosted runners, so it
            # runs last and is non-fatal: AppImage/deb/rpm are already published
            # above, so a snap failure never blocks a release. The .snap is
            # uploaded to the GitHub Release (snap.publish in electron-builder.yml).
            # Set SNAPCRAFT_STORE_CREDENTIALS as a secret to also push to the Snap
            # Store instead of only attaching the artifact.
            - name: Install snapcraft (Linux)
              if: matrix.platform == 'linux'
              continue-on-error: true
              run: sudo snap install snapcraft --classic

            - name: Build & publish snap (Linux)
              if: matrix.platform == 'linux'
              continue-on-error: true
              run: npx electron-builder --linux snap --publish always
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

    # After every installer has been uploaded to the release, refresh the
    # in-repo package-manager seeds (Scoop / Flatpak / AUR / winget) so their
    # version + url + sha256 match the new artifacts, and commit them back to the
    # default branch. This job checks out `main` (not the detached release tag)
    # so the commit lands on the branch, and only pushes when something changed.
    update-manifests:
        needs: build
        runs-on: ubuntu-latest
        name: update packaging manifests
        # Only stable releases seed the manifests; skip pre-releases.
        if: ${{ !github.event.release.prerelease }}
        steps:
            - uses: actions/checkout@v7
              with:
                  ref: main
                  persist-credentials: true

            - uses: actions/setup-node@v6
              with:
                  node-version: '24'

            # Recompute every manifest's version/url/sha256 from the release assets
            # produced by the build job above.
            - name: Refresh packaging manifests
              run: node scripts/update-packaging-manifests.mjs --version "${{ github.event.release.tag_name }}"

            - name: Commit refreshed manifests
              run: |
                  if git diff --quiet -- packaging; then
                      echo 'Packaging manifests already up to date — nothing to commit.'
                      exit 0
                  fi
                  git config user.name 'github-actions[bot]'
                  git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
                  git add packaging
                  git commit -m "chore: refresh packaging manifests for ${{ github.event.release.tag_name }}"
                  git push origin main
