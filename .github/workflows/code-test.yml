name: Lint & Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [22, 24, 25]
        name: lint & test w/ node v${{ matrix.node }}
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}
            - run: npm ci --no-workspaces
            - run: npm run lint
            - run: npm test
