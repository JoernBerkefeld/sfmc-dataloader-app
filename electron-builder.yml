appId: com.joernberkefeld.sfmc-dataloader-app
productName: SFMC Data Loader
copyright: Copyright © Joern Berkefeld

directories:
    output: release
    buildResources: build

# Ship only what the app needs. sfmc-dataloader + its runtime deps are included
# via node_modules; optional `mcdev` is excluded through .npmrc (omit=optional).
files:
    - src/**/*
    - package.json
    - '!**/*.map'

# asar keeps startup fast; native/unpacked modules are added here if ever needed.
asar: true

npmRebuild: false

win:
    target:
        - target: nsis
          arch:
              - x64
    # Use the package slug (no spaces) so download URLs are predictable for
    # winget/Scoop. GitHub rewrites spaces in asset names to dots, which would
    # make ${productName}-based URLs fragile.
    artifactName: ${name}-${version}-win-${arch}.${ext}

nsis:
    oneClick: false
    perMachine: false
    allowToChangeInstallationDirectory: true
    deleteAppDataOnUninstall: false

mac:
    category: public.app-category.developer-tools
    hardenedRuntime: true
    gatekeeperAssess: false
    entitlements: build/entitlements.mac.plist
    entitlementsInherit: build/entitlements.mac.plist
    # Default to an unsigned build. An empty CSC_LINK is otherwise treated as a
    # certificate path and crashes with "<repo> not a file". To enable signing,
    # remove this line and provide the MAC_CSC_LINK / APPLE_* repository secrets.
    identity: null
    target:
        - target: dmg
          arch:
              - x64
              - arm64
    artifactName: ${name}-${version}-mac-${arch}.${ext}

linux:
    category: Development
    # AppImage self-updates via electron-updater; deb/rpm/snap are handled by the
    # user's package manager / the Snap Store. rpm needs `rpm` (rpmbuild) and snap
    # needs snapcraft on the build runner — both installed in the release workflow.
    target:
        - AppImage
        - deb
        - rpm
        - snap
    artifactName: ${name}-${version}-linux-${arch}.${ext}

# By default electron-builder publishes snaps straight to the Snap Store, which
# needs store credentials and would fail the release. Pin the snap publish
# target to GitHub so the .snap is just uploaded as a release asset like the
# other Linux artifacts. Store publishing is handled separately (see the
# optional snapcraft step in .github/workflows/build-release.yml).
snap:
    publish:
        provider: github
        owner: JoernBerkefeld
        repo: sfmc-dataloader-app

# Uploads built installers to the matching GitHub Release when electron-builder
# is invoked with `--publish always` (see .github/workflows/build-release.yml).
# Local `npm run dist` uses `--publish never`, so nothing is uploaded by accident.
#
# `releaseType: release` is required because the release is created as *published*
# (not a draft) before the workflow runs. electron-builder defaults to `draft`,
# and a draft publishing type is "not compatible" with an already-published
# release, which makes it silently skip every upload.
publish:
    provider: github
    owner: JoernBerkefeld
    repo: sfmc-dataloader-app
    releaseType: release
